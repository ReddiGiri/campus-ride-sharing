<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Campus Ride Sharing</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body id="body" class="bg-dark text-white">

    <div class="container py-5">

        {% if user %}

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h4>
                Welcome, {{ user }} 😎
            </h4>

            <div class="d-flex gap-2">

                <button
                    onclick="toggleMode()"
                    class="btn btn-warning">

                    🌙 Mode

                </button>

                <a href="/logout" class="btn btn-danger">
                    Logout
                </a>

            </div>

        </div>

        {% endif %}

        <h1 class="text-center text-info mb-5">
            🚗 Campus Ride Sharing
        </h1>

        <div class="card p-4 shadow-lg mb-5">

            <h3 class="mb-4 text-dark">
                Post a Ride
            </h3>

            <form method="POST">

                <div class="row g-3">

                    <div class="col-md-4">

                        <input
                            type="text"
                            name="name"
                            class="form-control"
                            placeholder="Driver Name"
                            required>

                    </div>

                    <div class="col-md-4">

                        <input
                            type="text"
                            name="destination"
                            class="form-control"
                            placeholder="Destination"
                            required>

                    </div>

                    <div class="col-md-2">

                        <input
                            type="number"
                            name="seats"
                            class="form-control"
                            placeholder="Seats"
                            required>

                    </div>

                    <div class="col-md-2">

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Post

                        </button>

                    </div>

                </div>

            </form>

        </div>

        <h2 class="mb-4">
            Available Rides
        </h2>

        <form method="GET" class="mb-4">

            <div class="row">

                <div class="col-md-10">

                    <input
                        type="text"
                        name="search"
                        class="form-control"
                        placeholder="Search destination">

                </div>

                <div class="col-md-2">

                    <button
                        type="submit"
                        class="btn btn-warning w-100">

                        Search

                    </button>

                </div>

            </div>

        </form>

        <div class="row">

            {% for ride in rides %}

            <div class="col-md-4 mb-4">

                <div class="card shadow-lg h-100">

                    <div class="card-body">

                        <h4 class="card-title text-primary">
                            {{ ride[3] }}
                        </h4>

                        <p class="card-text text-dark">

                            Driver:
                            <strong>{{ ride[2] }}</strong>

                        </p>

                        <p class="text-muted">

                            Posted by:
                            {{ ride[1] }}

                        </p>

                        <span class="badge bg-success mb-3">

                            {{ ride[4] }} Seats Left

                        </span>

                        <br>

                        <a
                            href="/book/{{ ride[0] }}"
                            class="btn btn-success">

                            Book

                        </a>

                        <a
                            href="/delete/{{ ride[0] }}"
                            class="btn btn-danger">

                            Delete

                        </a>

                    </div>

                </div>

            </div>

            {% endfor %}

        </div>

    </div>

    <script>

        function toggleMode() {

            let body = document.getElementById("body");

            if (body.classList.contains("bg-dark")) {

                body.classList.remove("bg-dark");
                body.classList.remove("text-white");

            }

            else {

                body.classList.add("bg-dark");
                body.classList.add("text-white");

            }

        }

    </script>

</body>

</html>
