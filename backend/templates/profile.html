<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container py-5">

    <div class="card mx-auto shadow-lg p-4 text-center" style="max-width: 450px;">

        <img src="{{ url_for('uploaded_file', filename=user[1]) }}"
             width="120"
             height="120"
             class="rounded-circle mx-auto mb-3"
             style="object-fit:cover;">

        <h2 class="text-dark">
            {{ user[0] }}
        </h2>

        <span class="badge bg-success mb-3">
            Verified Student ✅
        </span>

        <p class="text-dark">
            <strong>College ID:</strong> {{ user[2] }}
        </p>

        <p class="text-dark">
            <strong>Email:</strong> {{ user[3] }}
        </p>
        <a href="/myrides" class="btn btn-success mb-2">
            🚗 My Posted Rides
        </a>
        
        <p>Total Rides: {{ total_rides }}</p>
        <p>Completed: {{ completed_rides }}</p>
        <p>Active: {{ active_rides }}</p>
        <a href="/edit_profile"class="btn btn-warning w-100 mb-2">✏️ Edit Profile</a>

        <a href="/" class="btn btn-primary">
            Back to Home
        </a>

    </div>

</div>

</body>
</html>
